<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Globe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f4f6fa;
  color: #1a1a2e;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

#globe-container {
  width: 100%;
  height: 620px;
  position: relative;
  overflow: hidden;
  cursor: grab;
  background: #06060f;
}
#globe-container:active { cursor: grabbing; }

#globe-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#loading-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #444;
  font-size: 0.9rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  pointer-events: none;
  transition: opacity 0.5s;
}

.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  color: #888;
  letter-spacing: 0.5px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

#globe-tip {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 0.7rem;
  color: #333;
  letter-spacing: 1px;
}

#weather-section {
  padding: 40px 24px 60px;
  max-width: 1100px;
  margin: 0 auto;
}

h2 {
  text-align: center;
  font-size: 0.75rem;
  color: #8090a8;
  margin-bottom: 28px;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.weather-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}

.weather-card {
  background: #ffffff;
  border: 1px solid #dde3ed;
  border-radius: 14px;
  padding: 22px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}
.weather-card:hover { border-color: #b8c4d8; }

.card-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--city-color, #fff);
  opacity: 0.8;
}
.card-glow {
  position: absolute;
  top: -40px; left: -40px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: var(--city-color, #fff);
  opacity: 0.03;
  filter: blur(30px);
  pointer-events: none;
}

.city-name {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--city-color, #fff);
  margin-bottom: 2px;
}
.country-name {
  font-size: 0.7rem;
  color: #8090a8;
  margin-bottom: 18px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.current-section {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid #e8ecf2;
}

.temp-block { display: flex; align-items: flex-start; gap: 2px; }
.temp-value {
  font-size: 3rem;
  font-weight: 200;
  line-height: 1;
  color: #1a1a2e;
}
.temp-unit {
  font-size: 1rem;
  color: #8090a8;
  padding-top: 4px;
}
.current-icon { font-size: 1.6rem; margin-bottom: 2px; }

.meta-block { text-align: right; }
.meta-row {
  font-size: 0.78rem;
  color: #8090a8;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
}
.meta-row .val { color: #3a4a5a; }
.meta-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }

.forecast-header {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #8090a8;
  margin-bottom: 12px;
}

.forecast-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.forecast-icon-label { display: flex; align-items: center; gap: 10px; }
.f-icon { font-size: 1.4rem; }
.f-label {
  font-size: 0.8rem;
  color: #5a6a7a;
  max-width: 90px;
  line-height: 1.3;
}
.f-precip { font-size: 0.7rem; color: #6080a0; margin-top: 2px; }

.forecast-temps { text-align: right; }
.f-max { font-size: 1.1rem; color: #cc6644; font-weight: 500; }
.f-min { font-size: 0.85rem; color: #4477aa; margin-top: 2px; }

.card-loading {
  font-size: 0.8rem;
  color: #a0a0b0;
  font-style: italic;
  margin-top: 10px;
}
.card-error { font-size: 0.8rem; color: #cc5555; margin-top: 10px; }

@media (max-width: 600px) {
  #globe-container { height: 420px; }
  .weather-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="globe-container">
  <canvas id="globe-canvas"></canvas>
  <div id="loading-overlay">Loading Globe...</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#FF6B35"></div>Sindelfingen</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFD23F"></div>Stuttgart</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EE4266"></div>Damascus</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3BCEAC"></div>Seoul</div>
  </div>
  <div id="globe-tip">drag to rotate</div>
</div>

<div id="weather-section">
  <h2>Weather Report</h2>
  <div class="weather-grid" id="weather-grid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ─── City Data ──────────────────────────────────────────────────────────────
const CITIES = [
  { name: 'Sindelfingen', country: 'Germany',      lat: 48.7141, lon:   9.0056, hex: '#FF6B35', rgb: [1.0, 0.42, 0.21] },
  { name: 'Stuttgart',    country: 'Germany',      lat: 48.7758, lon:   9.1829, hex: '#FFD23F', rgb: [1.0, 0.82, 0.24] },
  { name: 'Damascus',     country: 'Syria',        lat: 33.5138, lon:  36.2765, hex: '#EE4266', rgb: [0.93, 0.26, 0.40] },
  { name: 'Seoul',        country: 'South Korea',  lat: 37.5665, lon: 126.9780, hex: '#3BCEAC', rgb: [0.23, 0.81, 0.67] },
];

// Convert lat/lon → normalized 3D vector (Three.js SphereGeometry convention)
function latLonToVec3(lat, lon) {
  const phi   = (lon + 180) * Math.PI / 180;   // 0 → 2π
  const theta = (90  - lat) * Math.PI / 180;   // 0 (N pole) → π (S pole)
  return new THREE.Vector3(
    Math.sin(theta) * Math.cos(phi),
    Math.cos(theta),
    Math.sin(theta) * Math.sin(phi)
  ).normalize();
}

const cityVecs = CITIES.map(c => latLonToVec3(c.lat, c.lon));

// ─── Three.js Setup ──────────────────────────────────────────────────────────
const container = document.getElementById('globe-container');
const canvas    = document.getElementById('globe-canvas');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, container.clientWidth / container.clientHeight, 0.1, 500);
camera.position.z = 2.6;

// Stars
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000 * 3);
for (let i = 0; i < starPos.length; i++) starPos[i] = (Math.random() - 0.5) * 200;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.7 })));

// ─── Shaders ─────────────────────────────────────────────────────────────────
const VERT = `
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vPos;
void main() {
  vUv     = uv;
  vNormal = normalize(normalMatrix * normal);
  vPos    = normalize(position);
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;

const FRAG = `
uniform sampler2D tex;
uniform vec3  c0, c1, c2, c3;   // city colors
uniform vec3  p0, p1, p2, p3;   // city positions (unit sphere)
uniform float cr;                 // cos(city angular radius)
uniform vec3  sun;
varying vec2  vUv;
varying vec3  vNormal;
varying vec3  vPos;

void main() {
  vec4  s    = texture2D(tex, vUv);
  float gray = dot(s.rgb, vec3(0.299, 0.587, 0.114));
  vec3  col  = vec3(gray * 0.95 + 0.02);   // slight lift

  // City regions — smooth highlight
  float d0 = dot(vPos, p0);
  float d1 = dot(vPos, p1);
  float d2 = dot(vPos, p2);
  float d3 = dot(vPos, p3);

  float b0 = smoothstep(cr, mix(cr, 1.0, 0.6), d0);
  float b1 = smoothstep(cr, mix(cr, 1.0, 0.6), d1);
  float b2 = smoothstep(cr, mix(cr, 1.0, 0.6), d2);
  float b3 = smoothstep(cr, mix(cr, 1.0, 0.6), d3);

  col = mix(col, col * 0.25 + c0 * 0.75, b0 * 0.9);
  col = mix(col, col * 0.25 + c1 * 0.75, b1 * 0.9);
  col = mix(col, col * 0.25 + c2 * 0.75, b2 * 0.9);
  col = mix(col, col * 0.25 + c3 * 0.75, b3 * 0.9);

  // Lighting
  float diff    = max(0.0, dot(vNormal, sun));
  float ambient = 0.22;
  col *= (ambient + diff * 0.78);

  // Subtle night blue tint
  float dark = 1.0 - clamp(dot(vNormal, sun) * 2.0, 0.0, 1.0);
  col += vec3(0.0, 0.01, 0.04) * dark;

  gl_FragColor = vec4(col, 1.0);
}
`;

const ATM_VERT = `
varying vec3 vNormal;
void main() {
  vNormal = normalize(normalMatrix * normal);
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;
const ATM_FRAG = `
varying vec3 vNormal;
void main() {
  float rim = 1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
  float i   = pow(rim, 2.8) * 0.6;
  gl_FragColor = vec4(0.25, 0.55, 1.0, i);
}
`;

// ─── Globe Creation ───────────────────────────────────────────────────────────
let globe;

function buildGlobe(texture) {
  document.getElementById('loading-overlay').style.opacity = '0';

  const uniforms = {
    tex: { value: texture },
    p0:  { value: cityVecs[0] }, p1: { value: cityVecs[1] },
    p2:  { value: cityVecs[2] }, p3: { value: cityVecs[3] },
    c0:  { value: new THREE.Vector3(...CITIES[0].rgb) },
    c1:  { value: new THREE.Vector3(...CITIES[1].rgb) },
    c2:  { value: new THREE.Vector3(...CITIES[2].rgb) },
    c3:  { value: new THREE.Vector3(...CITIES[3].rgb) },
    cr:  { value: Math.cos(4.5 * Math.PI / 180) },  // 4.5° radius
    sun: { value: new THREE.Vector3(1.2, 0.6, 1.0).normalize() },
  };

  globe = new THREE.Mesh(
    new THREE.SphereGeometry(1, 72, 72),
    new THREE.ShaderMaterial({ uniforms, vertexShader: VERT, fragmentShader: FRAG })
  );

  // Initial rotation so lon -0.3 (Greenwich/London) faces forward
  globe.rotation.y = 2.79;
  globe.rotation.x = -0.45;
  scene.add(globe);

  // City pin markers
  CITIES.forEach((city, i) => {
    const pinPos = cityVecs[i].clone().multiplyScalar(1.012);
    const pin = new THREE.Mesh(
      new THREE.SphereGeometry(0.018, 10, 10),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(city.hex) })
    );
    pin.position.copy(pinPos);
    // halo ring
    const halo = new THREE.Mesh(
      new THREE.RingGeometry(0.025, 0.038, 24),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(city.hex), side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
    );
    halo.position.copy(pinPos);
    halo.lookAt(new THREE.Vector3(0, 0, 0));
    globe.add(pin);
    globe.add(halo);
  });

  // Atmosphere shell
  const atmMat = new THREE.ShaderMaterial({
    vertexShader: ATM_VERT,
    fragmentShader: ATM_FRAG,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.12, 48, 48), atmMat));
}

// ─── Texture Loading ──────────────────────────────────────────────────────────
const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';

const TEXTURE_URLS = [
  'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg',
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/land_ocean_ice_cloud_2048.jpg',
];

function tryLoadTexture(urls, idx) {
  if (idx >= urls.length) {
    buildGlobe(makeFallbackTexture());
    return;
  }
  loader.load(urls[idx], buildGlobe, undefined, () => tryLoadTexture(urls, idx + 1));
}

function makeFallbackTexture() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  // Ocean
  ctx.fillStyle = '#1a3050'; ctx.fillRect(0, 0, 1024, 512);
  // Simple land approximation
  ctx.fillStyle = '#2d4a2d';
  // North America
  ctx.fillRect(50, 80, 170, 200);
  // South America
  ctx.fillRect(130, 250, 100, 170);
  // Europe/Africa
  ctx.fillRect(430, 70, 80, 100);
  ctx.fillRect(420, 165, 90, 220);
  // Asia
  ctx.fillRect(510, 60, 280, 180);
  // Australia
  ctx.fillRect(670, 300, 120, 90);
  return new THREE.CanvasTexture(c);
}

tryLoadTexture(TEXTURE_URLS, 0);

// ─── Interaction ──────────────────────────────────────────────────────────────
let drag = false, prev = { x: 0, y: 0 }, vel = { x: 0, y: 0 };

canvas.addEventListener('mousedown', e => { drag = true; vel = { x: 0, y: 0 }; prev = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mousemove', e => {
  if (!drag || !globe) return;
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  globe.rotation.y += dx * 0.004;
  globe.rotation.x = Math.max(-1.2, Math.min(1.2, globe.rotation.x + dy * 0.004));
  vel = { x: dy * 0.004, y: dx * 0.004 };
  prev = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => { drag = false; });

canvas.addEventListener('touchstart', e => { drag = true; prev = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (!drag || !globe) return;
  const dx = e.touches[0].clientX - prev.x, dy = e.touches[0].clientY - prev.y;
  globe.rotation.y += dx * 0.004;
  globe.rotation.x = Math.max(-1.2, Math.min(1.2, globe.rotation.x + dy * 0.004));
  prev = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchend', () => { drag = false; });

// ─── Animate ──────────────────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  if (globe && !drag) {
    globe.rotation.y += 0.0018;
    vel.x *= 0.92; vel.y *= 0.92;
    globe.rotation.x += vel.x * 0.1;
    globe.rotation.y += vel.y * 0.1;
  }
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ─── Weather ──────────────────────────────────────────────────────────────────
const WMO = {
   0: ['Clear sky',         '☀️'],
   1: ['Mainly clear',      '🌤️'],
   2: ['Partly cloudy',     '⛅'],
   3: ['Overcast',          '☁️'],
  45: ['Fog',               '🌫️'],
  48: ['Icy fog',           '🌫️'],
  51: ['Light drizzle',     '🌦️'],
  53: ['Drizzle',           '🌦️'],
  55: ['Heavy drizzle',     '🌧️'],
  61: ['Light rain',        '🌧️'],
  63: ['Rain',              '🌧️'],
  65: ['Heavy rain',        '🌧️'],
  71: ['Light snow',        '🌨️'],
  73: ['Snow',              '❄️'],
  75: ['Heavy snow',        '❄️'],
  77: ['Snow grains',       '❄️'],
  80: ['Rain showers',      '🌦️'],
  81: ['Showers',           '🌦️'],
  82: ['Heavy showers',     '⛈️'],
  85: ['Snow showers',      '🌨️'],
  95: ['Thunderstorm',      '⛈️'],
  99: ['Heavy thunderstorm','⛈️'],
};
function wmo(code) { return WMO[code] || ['—', '🌡️']; }

async function fetchWeather(city) {
  const url = `https://api.open-meteo.com/v1/forecast` +
    `?latitude=${city.lat}&longitude=${city.lon}` +
    `&current_weather=true` +
    `&hourly=relativehumidity_2m,apparent_temperature` +
    `&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max` +
    `&timezone=auto&forecast_days=2`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function findCurrentIdx(data) {
  const t = data.current_weather.time;
  const idx = data.hourly.time.indexOf(t);
  return idx >= 0 ? idx : new Date().getHours();
}

function cardHTML(city, data) {
  const cw   = data.current_weather;
  const idx  = findCurrentIdx(data);
  const hum  = data.hourly.relativehumidity_2m[idx] ?? '—';
  const feel = data.hourly.apparent_temperature ? Math.round(data.hourly.apparent_temperature[idx]) : null;
  const tMax = Math.round(data.daily.temperature_2m_max[1]);
  const tMin = Math.round(data.daily.temperature_2m_min[1]);
  const fCode = data.daily.weathercode[1];
  const rain  = data.daily.precipitation_probability_max[1] ?? 0;
  const [fLabel, fIcon] = wmo(fCode);
  const [cLabel, cIcon] = wmo(cw.weathercode);

  return `
    <div class="weather-card" style="--city-color:${city.hex}">
      <div class="card-accent"></div>
      <div class="card-glow"></div>
      <div class="city-name">${city.name}</div>
      <div class="country-name">${city.country}</div>
      <div class="current-section">
        <div>
          <div class="temp-block">
            <div class="temp-value">${Math.round(cw.temperature)}</div>
            <div class="temp-unit">°C</div>
          </div>
          <div style="font-size:0.75rem;color:#8090a8;margin-top:4px">${cLabel}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:1.8rem;margin-bottom:8px">${cIcon}</div>
          <div class="meta-row"><span class="meta-label">Humidity</span><span class="val">${hum}%</span></div>
          <div class="meta-row"><span class="meta-label">Wind</span><span class="val">${cw.windspeed} km/h</span></div>
          ${feel !== null ? `<div class="meta-row"><span class="meta-label">Feels</span><span class="val">${feel}°</span></div>` : ''}
        </div>
      </div>
      <div class="forecast-header">Tomorrow's Forecast</div>
      <div class="forecast-content">
        <div class="forecast-icon-label">
          <div class="f-icon">${fIcon}</div>
          <div>
            <div class="f-label">${fLabel}</div>
            <div class="f-precip">Rain ${rain}%</div>
          </div>
        </div>
        <div class="forecast-temps">
          <div class="f-max">↑ ${tMax}°</div>
          <div class="f-min">↓ ${tMin}°</div>
        </div>
      </div>
    </div>`;
}

function skeletonCard(city) {
  return `
    <div class="weather-card" style="--city-color:${city.hex}">
      <div class="card-accent"></div>
      <div class="city-name">${city.name}</div>
      <div class="country-name">${city.country}</div>
      <div class="card-loading">Fetching weather data…</div>
    </div>`;
}

function errorCard(city) {
  return `
    <div class="weather-card" style="--city-color:${city.hex}">
      <div class="card-accent"></div>
      <div class="city-name">${city.name}</div>
      <div class="country-name">${city.country}</div>
      <div class="card-error">Could not load weather data.</div>
    </div>`;
}

async function loadWeather() {
  const grid = document.getElementById('weather-grid');
  grid.innerHTML = CITIES.map(skeletonCard).join('');

  const results = await Promise.allSettled(CITIES.map(fetchWeather));

  grid.innerHTML = results.map((r, i) =>
    r.status === 'fulfilled' ? cardHTML(CITIES[i], r.value) : errorCard(CITIES[i])
  ).join('');
}

loadWeather();
</script>
</body>
</html>
